name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, test, and build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:links
      - run: pnpm check
      - run: pnpm --filter @future/web build

  e2e:
    name: Browser acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Docker demo smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: docker build -t singularity-demo .
      - name: Boot the demo and probe the API
        run: |
          docker run -d --name demo -p 4173:4173 -p 4174:4174 singularity-demo
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4174/api/health | grep -q '"ok":true'; then
              exit 0
            fi
            sleep 2
          done
          docker logs demo
          exit 1
