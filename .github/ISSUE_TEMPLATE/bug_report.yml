name: Bug report
description: Report a reproducible problem in Future
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include keys, private exports, raw prompts, or database contents. Report security issues through SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or a commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Install or startup
        - Imports
        - Retrieval or citations
        - Memory
        - Local provider
        - External approval or redaction
        - Browser UI
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal, numbered steps using non-sensitive sample data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, provider kind, and relevant safe diagnostics.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, personal data, raw prompts, and private database content.
          required: true
        - label: This is not a private security report.
          required: true
