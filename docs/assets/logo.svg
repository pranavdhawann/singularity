<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Singularity">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1a1e"/>
      <stop offset="0.55" stop-color="#0e2227"/>
      <stop offset="1" stop-color="#081316"/>
    </linearGradient>
    <radialGradient id="disk" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.30" stop-color="#04090a"/>
      <stop offset="0.52" stop-color="#0a1d20"/>
      <stop offset="0.66" stop-color="#1f8f83"/>
      <stop offset="0.80" stop-color="#57e0c9"/>
      <stop offset="1" stop-color="#0b1a1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.55" stop-color="#000000"/>
      <stop offset="0.9" stop-color="#03181a"/>
      <stop offset="1" stop-color="#03181a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ff3df"/>
      <stop offset="0.5" stop-color="#33b3a3"/>
      <stop offset="1" stop-color="#1c6f66"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4fbf9"/>
      <stop offset="1" stop-color="#bfe9e0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>

  <!-- accretion disk + event horizon -->
  <g transform="translate(196 180)">
    <ellipse cx="0" cy="0" rx="132" ry="132" fill="url(#disk)"/>
    <ellipse cx="0" cy="0" rx="150" ry="44" fill="none" stroke="url(#ring)" stroke-width="7" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="150" ry="44" transform="rotate(28)" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="150" ry="44" transform="rotate(-28)" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.55"/>
    <circle cx="0" cy="0" r="70" fill="url(#core)"/>
    <circle cx="0" cy="0" r="70" fill="#000000"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#6fe6d1" stroke-width="2.5" opacity="0.85"/>
  </g>

  <!-- wordmark -->
  <text x="410" y="196" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="2" fill="url(#word)">Singularity</text>
  <text x="414" y="250" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="0.5" fill="#7fb8b0">Local memory &amp; permission layer for AI assistants</text>
</svg>
